# Fly.io config for Garmin Tracker
# Docs: https://fly.io/docs/reference/configuration/
#
# First-time setup (from repo root):
#   fly auth login
#   fly apps create garmin-activity-tracker   # pick a free name if taken
#   fly volumes create garmin_data --region dfw --size 1
#   fly secrets set SECRET_KEY=... TOKEN_ENCRYPTION_KEY=...
#   fly deploy
#
# Note: Fly has no Denver region; dfw (Dallas) is a good central-US choice.

app = 'garmin-activity-tracker'
primary_region = 'dfw'

[build]

[env]
  DATABASE_URL = 'sqlite:////data/garmin_tracker.db'
  STATIC_DIR = '/app/frontend/dist'
  DEBUG = 'false'
  DEFAULT_TIMEZONE = 'America/Denver'
  BACKFILL_DAYS = '365'
  # Browser same-origin; * is fine behind Fly HTTPS for this SPA
  CORS_ORIGINS = '*'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

[[mounts]]
  source = 'garmin_data'
  destination = '/data'
  initial_size = '1gb'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
