# https://mise.jdx.dev/
# Install tools:  mise install
# List tasks:     mise tasks
# Run a task:     mise run <name>

[tools]
node = "24"
uv = "0.11"
flyctl = "0.4"

[env]
# Consistent local ports / API URL for the SPA
VITE_API_URL = "http://127.0.0.1:8000"
# Fly.io app name (override: FLY_APP=other-name mise run fly:deploy)
FLY_APP = "garmin-activity-tracker"
FLY_REGION = "dfw"
_.file = [
  # Optional local overrides (not committed)
  "{{config_root}}/backend/.env",
]

[settings]
# Allow this project's mise.toml without interactive trust prompts in CI-like envs
experimental = true

# ---------------------------------------------------------------------------
# Setup
# ---------------------------------------------------------------------------

[tasks.install]
description = "Install backend (uv) + frontend (npm) dependencies"
run = [
  "mise run install:backend",
  "mise run install:frontend",
]

[tasks."install:backend"]
description = "uv sync backend deps (create .env from example if missing)"
dir = "{{config_root}}/backend"
run = """
#!/usr/bin/env bash
set -euo pipefail
if [[ ! -f .env ]]; then
  cp .env.example .env
  echo "Created backend/.env from .env.example — set SECRET_KEY / TOKEN_ENCRYPTION_KEY"
fi
uv sync
"""

[tasks."install:frontend"]
description = "npm install frontend deps"
dir = "{{config_root}}/frontend"
run = "npm install"

[tasks.setup]
description = "Alias for install"
depends = ["install"]

# ---------------------------------------------------------------------------
# Dev servers
# ---------------------------------------------------------------------------

[tasks.backend]
description = "Start FastAPI with reload (http://127.0.0.1:8000)"
dir = "{{config_root}}/backend"
run = "uv run uvicorn garmin_tracker.main:app --reload --host 127.0.0.1 --port 8000"

[tasks.api]
description = "Alias for backend"
depends = ["backend"]

[tasks.frontend]
description = "Start Vite dev server (http://localhost:5173)"
dir = "{{config_root}}/frontend"
run = "npm run dev -- --host 127.0.0.1 --port 5173"

[tasks.ui]
description = "Alias for frontend"
depends = ["frontend"]

[tasks.dev]
description = "Start backend + frontend in parallel"
run = """
#!/usr/bin/env bash
set -euo pipefail
trap 'kill 0' EXIT
mise run backend &
mise run frontend &
wait
"""

[tasks."stop:dev"]
description = "Stop local backend (8000) and frontend (5173)"
run = """
#!/usr/bin/env bash
set -euo pipefail

stop_port() {
  local port="$1"
  local name="$2"
  local pids
  pids=$(lsof -ti tcp:"$port" -sTCP:LISTEN 2>/dev/null || true)
  if [[ -z "${pids}" ]]; then
    echo "${name}: nothing listening on :${port}"
    return 0
  fi
  echo "${name}: stopping PID(s) ${pids//$'\n'/ } on :${port}"
  # shellcheck disable=SC2086
  kill ${pids} 2>/dev/null || true
  sleep 0.4
  pids=$(lsof -ti tcp:"$port" -sTCP:LISTEN 2>/dev/null || true)
  if [[ -n "${pids}" ]]; then
    echo "${name}: force kill ${pids//$'\n'/ }"
    # shellcheck disable=SC2086
    kill -9 ${pids} 2>/dev/null || true
  fi
  echo "${name}: stopped"
}

stop_port 8000 "backend"
stop_port 5173 "frontend"
echo "Local dev services stopped."
"""

[tasks.stop]
description = "Alias for stop:dev (local only, not Fly)"
depends = ["stop:dev"]

# ---------------------------------------------------------------------------
# Quality / build
# ---------------------------------------------------------------------------

[tasks.test]
description = "Run backend pytest"
dir = "{{config_root}}/backend"
run = "uv run pytest -q"

[tasks.lint]
description = "Lint backend (ruff) + frontend (oxlint)"
run = [
  "mise run lint:backend",
  "mise run lint:frontend",
]

[tasks."lint:backend"]
description = "ruff check backend"
dir = "{{config_root}}/backend"
run = "uv run ruff check src tests"

[tasks."lint:frontend"]
description = "oxlint frontend"
dir = "{{config_root}}/frontend"
run = "npm run lint"

[tasks.build]
description = "Production build of the frontend"
dir = "{{config_root}}/frontend"
run = "npm run build"

[tasks.check]
description = "test + lint + frontend build"
run = [
  "mise run test",
  "mise run lint",
  "mise run build",
]

# ---------------------------------------------------------------------------
# Utilities
# ---------------------------------------------------------------------------

[tasks.docs]
description = "Open API OpenAPI docs in the browser (API must be running)"
run = """
#!/usr/bin/env bash
set -euo pipefail
url="http://127.0.0.1:8000/docs"
if command -v open >/dev/null 2>&1; then
  open "$url"
else
  echo "$url"
fi
"""

[tasks.secrets]
description = "Print generated SECRET_KEY and TOKEN_ENCRYPTION_KEY for .env"
dir = "{{config_root}}/backend"
run = """
#!/usr/bin/env bash
set -euo pipefail
uv run python - <<'PY'
import secrets
from cryptography.fernet import Fernet
print("SECRET_KEY=" + secrets.token_urlsafe(32))
print("TOKEN_ENCRYPTION_KEY=" + Fernet.generate_key().decode())
PY
"""

[tasks."shell:backend"]
description = "Python REPL with backend package on path"
dir = "{{config_root}}/backend"
run = "uv run python"

[tasks."db:path"]
description = "Show SQLite database path"
dir = "{{config_root}}/backend"
run = """
#!/usr/bin/env bash
set -euo pipefail
echo "$(pwd)/data/garmin_tracker.db"
ls -la data/garmin_tracker.db 2>/dev/null || echo "(db not created yet — start the backend once)"
"""

# ---------------------------------------------------------------------------
# Fly.io (app: $FLY_APP, region: $FLY_REGION)
# ---------------------------------------------------------------------------

[tasks."fly:auth"]
description = "Log in to Fly.io (browser)"
run = "fly auth login"

[tasks."fly:whoami"]
description = "Show current Fly user"
run = "fly auth whoami"

[tasks."fly:status"]
description = "App status, machines, image"
run = "fly status -a \"$FLY_APP\""

[tasks."fly:logs"]
description = "Tail Fly app logs"
run = "fly logs -a \"$FLY_APP\""

[tasks."fly:open"]
description = "Open app URL in browser"
run = "fly open -a \"$FLY_APP\""

[tasks."fly:deploy"]
description = "Deploy to Fly (remote build, no cache)"
run = "fly deploy -a \"$FLY_APP\" --remote-only --no-cache"

[tasks."fly:deploy:quick"]
description = "Deploy to Fly (remote build, use cache)"
run = "fly deploy -a \"$FLY_APP\" --remote-only"

[tasks."fly:secrets:set"]
description = "Generate and set SECRET_KEY + TOKEN_ENCRYPTION_KEY on Fly (prints values once)"
dir = "{{config_root}}/backend"
run = """
#!/usr/bin/env bash
set -euo pipefail
SECRET=$(uv run python -c 'import secrets; print(secrets.token_urlsafe(32))')
FERNET=$(uv run python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')
echo "Saving these locally is recommended (password manager / backend/.env):"
echo "SECRET_KEY=$SECRET"
echo "TOKEN_ENCRYPTION_KEY=$FERNET"
echo ""
fly secrets set \
  SECRET_KEY="$SECRET" \
  TOKEN_ENCRYPTION_KEY="$FERNET" \
  -a "$FLY_APP"
echo "Secrets staged/set on $FLY_APP. Deploy with: mise run fly:deploy"
"""

[tasks."fly:secrets:list"]
description = "List Fly secret names (values never shown)"
run = "fly secrets list -a \"$FLY_APP\""

[tasks."fly:volume:create"]
description = "Create 1GB SQLite volume in FLY_REGION (one-time)"
run = """
#!/usr/bin/env bash
set -euo pipefail
fly volumes create garmin_data --region "$FLY_REGION" --size 1 -a "$FLY_APP"
"""

[tasks."fly:volumes"]
description = "List Fly volumes for the app"
run = "fly volumes list -a \"$FLY_APP\""

[tasks."fly:ssh"]
description = "SSH console into the Fly machine"
run = "fly ssh console -a \"$FLY_APP\""

[tasks."fly:health"]
description = "curl /api/health on the deployed app"
run = """
#!/usr/bin/env bash
set -euo pipefail
url="https://${FLY_APP}.fly.dev/api/health"
echo "GET $url"
curl -fsS "$url"
echo
"""

[tasks."fly:releases"]
description = "List recent Fly releases"
run = "fly releases -a \"$FLY_APP\""
